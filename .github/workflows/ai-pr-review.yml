name: AI PR Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  ai-pr-review:
    if: |
      github.event.sender.type != 'Bot' &&
      (
        github.event_name == 'pull_request' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
          startsWith(github.event.comment.body, '/review')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Review pull request
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.PR_AGENT_OPENAI_KEY }}
          OPENAI_API_BASE: ${{ secrets.PR_AGENT_OPENAI_API_BASE }}
          PR_REVIEW_MODEL: "astron-code-latest"
        with:
          script: |
            const marker = '<!-- ai-pr-review-bot -->';
            const pullNumber = context.payload.pull_request?.number ?? context.payload.issue?.number;
            const { owner, repo } = context.repo;

            if (!process.env.OPENAI_API_KEY || !process.env.OPENAI_API_BASE) {
              throw new Error('PR_AGENT_OPENAI_KEY and PR_AGENT_OPENAI_API_BASE secrets are required.');
            }

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const rawDiffText = files.map((file) => {
              const patch = file.patch || '[binary or patch unavailable]';
              return [
                `File: ${file.filename}`,
                `Status: ${file.status}; +${file.additions} -${file.deletions}`,
                patch,
              ].join('\n');
            }).join('\n\n---\n\n');
            const diffText = rawDiffText.length > 24000
              ? `${rawDiffText.slice(0, 24000)}\n\n[Diff truncated at 24000 characters]`
              : rawDiffText;

            const system = [
              'You are an experienced code reviewer.',
              'Review the pull request for correctness, security, maintainability, and CI/configuration risks.',
              'Return concise Markdown in Chinese.',
              'If there are no actionable issues, say that clearly and mention residual risks.',
            ].join(' ');

            const user = [
              `Repository: ${owner}/${repo}`,
              `Pull Request: #${pull.number} ${pull.title}`,
              `Author: ${pull.user.login}`,
              `Base: ${pull.base.ref}`,
              `Head: ${pull.head.ref}`,
              '',
              'Changed files and patches:',
              diffText || '[No diff available]',
            ].join('\n');

            const baseUrl = process.env.OPENAI_API_BASE.replace(/\/$/, '');
            let response;
            let responseText = '';
            try {
              const controller = new AbortController();
              const timeout = setTimeout(() => controller.abort(), 300000);
              try {
                response = await fetch(`${baseUrl}/chat/completions`, {
                  method: 'POST',
                  signal: controller.signal,
                  headers: {
                    authorization: `Bearer ${process.env.OPENAI_API_KEY}`,
                    'content-type': 'application/json',
                    accept: 'application/json',
                    'user-agent': 'GitHubActions-AI-PR-Review',
                  },
                  body: JSON.stringify({
                    model: process.env.PR_REVIEW_MODEL,
                    messages: [
                      { role: 'system', content: system },
                      { role: 'user', content: user },
                    ],
                    temperature: 0.2,
                    stream: false,
                    enable_thinking: true,
                    max_tokens: 16384,
                  }),
                });
                responseText = await response.text();
              } finally {
                clearTimeout(timeout);
              }
            } catch (error) {
              responseText = error?.name === 'AbortError'
                ? 'AI endpoint request timed out after 300 seconds.'
                : (error?.message || String(error));
            }

            let review;
            let reasoningLength = 0;
            if (response?.ok) {
              try {
                const payload = JSON.parse(responseText);
                const message = payload?.choices?.[0]?.message;
                const finishReason = payload?.choices?.[0]?.finish_reason;
                reasoningLength = message?.reasoning_content?.length || 0;
                review = message?.content?.trim() || message?.reasoning_content?.trim();
                console.log(`AI review: finish_reason=${finishReason} contentLen=${message?.content?.length || 0} reasoningLen=${reasoningLength} usage=${JSON.stringify(payload?.usage)}`);
              } catch (error) {
                console.log(`AI review parse error: ${error?.message || error}`);
                review = null;
              }
            }

            if (!review) {
              const gatewayBlocked = responseText.includes('验证失败') || responseText.includes('<!DOCTYPE html>');
              review = [
                '> AI review was not generated.',
                '',
                gatewayBlocked
                  ? 'GitHub Actions reached the configured API endpoint, but the gateway returned an HTML verification page instead of JSON.'
                  : `The AI endpoint returned an unusable response. HTTP status: ${response?.status ?? 'request failed'}.`,
                '',
                'Action needed: use an API base URL that GitHub-hosted runners can access without browser verification, or run this workflow on a self-hosted runner that can pass the gateway policy.',
              ].join('\n');
            }

            const headSha = (context.payload.pull_request?.head?.sha ?? context.sha ?? '').slice(0, 7);
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              '## AI PR Review',
              '',
              review,
              '',
              `<sub>Model: ${process.env.PR_REVIEW_MODEL} · Thinking: enabled${reasoningLength ? ` (${reasoningLength} chars)` : ''} · Commit: ${headSha} · [Run](${runUrl})</sub>`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pullNumber,
              body,
            });
